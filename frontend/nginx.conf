server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API proxy → backend container on the docker network
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    proxy_request_buffering off;
    # raise body limit for payslip PDF uploads (5 MB + overhead)
    client_max_body_size 10m;
  }

  # SPA fallback — let React Router handle unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # don't cache index.html so deploys take effect immediately
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # long-cache hashed assets
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
}
